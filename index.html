<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2b0f0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cellarium">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>
<title>Cellarium V8</title>
</head>
<body>

<section id="splash" class="splash">
  <button id="settingsOpenSplash" class="settings-cog">⚙︎</button>
  <img src="splash.png" class="splash-bg" alt="">
  <button id="goLogin" class="enter-hotspot" aria-label="Entrer dans la cave"></button>
</section>

<section id="login" class="login hidden">
  <button id="settingsOpenLogin" class="settings-cog">⚙︎</button>
  <div class="login-card">
    <img src="icon.png" class="login-icon">
    <h2>Connexion</h2>
    <form id="loginForm">
      <input id="loginEmail" type="email" placeholder="Identifiant / email" required>
      <input id="loginPassword" type="password" placeholder="Mot de passe" required>
      <button>Se connecter</button>
    </form>
    <button id="createAccount" class="link-btn">Créer un compte local</button>
    <p>Version locale : les données restent sur cet appareil.</p>
  </div>
</section>

<section id="app" class="app hidden">
  <header class="topbar">
    <button id="settingsOpenApp" class="settings-mini">⚙︎</button>
    <div>
      <span>Cellarium V8</span>
      <h1 id="screenTitle">La Cave</h1>
    </div>
    <img src="icon.png" class="top-icon">
  </header>

  <main>
    <section id="cave" class="screen visual-screen" data-bg="cave.png">
      <div class="glass-panel low">
        <input id="search" placeholder="Rechercher un vin...">
        <div id="bottleList" class="stack"></div>
      </div>
    </section>

    <section id="carnet" class="screen visual-screen hidden" data-bg="carnet.png">
      <div class="glass-panel">
        <div id="tastingList" class="stack"></div>
      </div>
    </section>

    <section id="traces" class="screen visual-screen hidden" data-bg="traces.png">
      <div class="glass-panel">
        <div id="traceList" class="stack"></div>
      </div>
    </section>

    <section id="souvenir" class="screen visual-screen hidden" data-bg="souvenir.png">
      <div class="memory-mobile">
        <h2 id="dailyTitle">—</h2>
        <blockquote id="dailyText">—</blockquote>
        <p id="dailyMeta">—</p>
      </div>
    </section>

    <section id="compagnons" class="screen visual-screen hidden" data-bg="compagnons.png">
      <div class="glass-panel"><div id="companionsList" class="stack"></div></div>
    </section>

    <section id="culture" class="screen visual-screen hidden" data-bg="culture.png">
      <div class="glass-panel"><div id="cultureList" class="stack"></div></div>
    </section>

    <section id="pantheon" class="screen visual-screen hidden" data-bg="pantheon.png">
      <div class="glass-panel dark"><div id="pantheonList" class="stack"></div></div>
    </section>

    <section id="destins" class="screen visual-screen hidden" data-bg="destins.png">
      <div class="glass-panel"><div id="destinyList" class="stack"></div></div>
    </section>

    <section id="portrait" class="screen visual-screen hidden" data-bg="portrait.png">
      <div class="glass-panel"><div id="portraitContent" class="stack"></div></div>
    </section>

    <section id="photos" class="screen visual-screen hidden" data-bg="carnet.png">
      <div class="glass-panel"><div id="photoList" class="photo-grid"></div></div>
    </section>

    <section id="livre" class="screen visual-screen hidden" data-bg="portrait.png">
      <div class="glass-panel">
        <h2>Le Livre Cellarium</h2>
        <p id="bookText"></p>
        <button id="exportBook" class="gold-btn">Exporter les données</button>
      </div>
    </section>

    <section id="addBottle" class="screen form-screen hidden">
      <h2>Ajouter une bouteille</h2>
      <form id="bottleForm" class="form">
        <input id="bWine" required placeholder="Vin / domaine">
        <input id="bVintage" type="number" placeholder="Millésime">
        <input id="bRegion" placeholder="Région">
        <div class="stepper-line">
          <button type="button" class="stepper" id="bQtyMinus">−</button>
          <span id="bQtyDisplay">1</span>
          <button type="button" class="stepper" id="bQtyPlus">+</button>
        </div>
        <input id="bValue" type="number" placeholder="Valeur estimée">
        <input id="bDestiny" placeholder="Destinée à...">
        <label><input id="bPantheon" type="checkbox"> Panthéon</label>
        <button>Ajouter</button>
      </form>
    </section>

    <section id="addTasting" class="screen form-screen hidden">
      <h2>Ajouter une dégustation</h2>
      <form id="tastingForm" class="form">
        <input id="tWine" required placeholder="Vin dégusté">
        <input id="tDate" type="date">
        <input id="tContext" placeholder="Contexte">
        <select id="tContextType"><option>Personnel</option><option>Professionnel</option><option>Familial</option><option>Amical</option></select>
        <input id="tPeople" placeholder="Avec qui ?">
        <input id="tMood" placeholder="État d’esprit">
        <select id="tSeason"><option>Printemps</option><option>Été</option><option>Automne</option><option>Hiver</option></select>
        <input id="tWeather" placeholder="Météo / atmosphère">
        <input id="tScore" type="number" placeholder="Note /100">
        <textarea id="tJournal" placeholder="Carnet : souvenir, sensation, image..."></textarea>
        <label>Photo<input id="tPhoto" type="file" accept="image/*"></label>
        <button>Ajouter</button>
      </form>
    </section>

    <section id="addTrace" class="screen form-screen hidden">
      <h2>Ajouter une trace</h2>
      <form id="traceForm" class="form">
        <select id="trType"><option>Mémoire</option><option>Émotion</option><option>Philosophique</option><option>Culturelle</option><option>Relationnelle</option><option>Sensorielle</option></select>
        <input id="trTitle" placeholder="Titre">
        <textarea id="trContent" required placeholder="Ce qui reste..."></textarea>
        <button>Ajouter</button>
      </form>
    </section>
  </main>

  <nav class="tabbar">
    <button data-nav="souvenir">Souvenir</button>
    <button class="active" data-nav="cave">Cave</button>
    <button data-nav="carnet">Carnet</button>
    <button data-nav="traces">Traces</button>
    <button data-nav="compagnons">Compagnons</button>
    <button data-nav="culture">Culture</button>
    <button data-nav="pantheon">Panthéon</button>
    <button data-nav="destins">Destins</button>
    <button data-nav="portrait">Portrait</button>
  </nav>

  <div class="fab-row">
    <button data-nav="addBottle">+ Vin</button>
    <button data-nav="addTasting">+ Dégustation</button>
    <button data-nav="addTrace">+ Trace</button>
  </div>
</section>

<aside id="settingsPanel" class="settings-panel hidden">
  <div class="settings-head"><h2>Settings</h2><button id="settingsClose">×</button></div>
  <section><h3>Compte</h3><input id="profileName" placeholder="Nom"><input id="profileEmail" placeholder="Email"><button id="saveProfile">Enregistrer</button></section>
  <section><h3>Sécurité</h3><input id="newPassword" type="password" placeholder="Nouveau mot de passe"><button id="changePassword">Changer le mot de passe</button></section>
  <section><h3>Données</h3><button id="exportData">Exporter</button><label class="import-label">Importer<input id="importData" type="file" accept="application/json"></label><button id="wipeData" class="danger">Tout supprimer</button></section>
  <section><h3>Session</h3><button id="logout">Déconnexion</button></section>
</aside>

</body>
</html>
